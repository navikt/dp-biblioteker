name: Test Branches

on:
  push:
    branches-ignore:
      - 'main'

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/wrapper-validation@v6.1.1
      - uses: gradle/actions/setup-gradle@v6.1.1
      - run: ./gradlew test